<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Corpul — Romanian with Georgiana</title>
<style>
  :root{
    --cream:#FFF7F0; --ink:#243a66; --navy:#1F3864;
    --pip:#AD1457; --green:#4EA72E; --green-d:#3d8a23;
    --amber:#F4A823; --teal:#2F8F9D; --purple:#7A4FB5;
    --card:#ffffff; --shadow:0 8px 24px rgba(36,58,102,.14);
    --radius:22px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:'Times New Roman','Georgia',serif;
    color:var(--ink); background:
      radial-gradient(1200px 500px at 80% -10%, #ffe6d2 0, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #d8f0ee 0, transparent 60%),
      var(--cream);
    min-height:100vh;
  }
  .wrap{max-width:780px;margin:0 auto;padding:14px 14px 60px}

  .top{display:flex;align-items:center;gap:12px;background:var(--card);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:10px 16px;margin-bottom:6px}
  .top .logo{font-weight:bold;font-size:1.3rem;color:var(--navy);display:flex;align-items:center;gap:8px}
  .top .logo .em{font-size:1.5rem}
  .stars{margin-left:auto;background:#fff3d6;color:#9a6b00;font-weight:bold;
    border:2px solid #ffd984;border-radius:999px;padding:6px 14px;font-size:1.05rem;white-space:nowrap}
  .home-btn{border:0;background:#eef2fb;color:var(--navy);font-weight:bold;font-family:inherit;
    border-radius:999px;padding:8px 14px;cursor:pointer;font-size:1rem}
  .home-btn:hover{background:#e2e8f7}
  .brand-sub{text-align:center;color:#9a7c4f;font-style:italic;font-size:1.02rem;margin:0 0 14px}

  .pip{display:flex;align-items:flex-start;gap:12px;margin:4px 2px 18px}
  .pip .bird{font-size:2.4rem;line-height:1;filter:drop-shadow(0 4px 6px rgba(0,0,0,.12))}
  .pip .bubble{background:var(--pip);color:#fff;border-radius:18px;border-bottom-left-radius:4px;
    padding:12px 16px;font-weight:bold;box-shadow:var(--shadow);max-width:560px;font-size:1.08rem}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:560px){.grid{grid-template-columns:1fr}}
  .tile{appearance:none;border:0;text-align:left;cursor:pointer;background:var(--card);
    border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;display:flex;gap:14px;align-items:center;
    transition:transform .12s ease, box-shadow .12s ease;font-family:inherit}
  .tile:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(36,58,102,.2)}
  .tile .ic{font-size:2.2rem;width:58px;height:58px;border-radius:16px;display:grid;place-items:center;flex:0 0 auto}
  .tile h3{margin:0 0 2px;font-size:1.25rem;color:var(--navy)}
  .tile p{margin:0;color:#6b7280;font-weight:bold;font-size:.95rem}
  .t0 .ic{background:#fff3d6}.t1 .ic{background:#e9f7e4}.t2 .ic{background:#e7f0fb}.t3 .ic{background:#fdeede}
  .t4 .ic{background:#f1e9fb}.t5 .ic{background:#dff1f1}

  .panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .panel h2{margin:.1em 0 .1em;color:var(--navy);font-size:1.5rem}
  .panel .sub{color:#6b7280;font-weight:bold;margin:0 0 14px}
  .hidden{display:none!important}

  /* scene tabs */
  .tabs{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:4px 0 8px}
  .tab{border:2px solid #e6eaf3;background:#fff;color:var(--navy);font-family:inherit;font-weight:bold;
    border-radius:999px;padding:8px 16px;cursor:pointer;font-size:1.02rem;transition:background .1s,border-color .1s}
  .tab:hover{border-color:#c9d4ea}
  .tab.on{background:var(--navy);border-color:var(--navy);color:#fff}

  .stage{display:grid;place-items:center;margin:6px 0;min-height:300px}
  .stage svg{width:100%;max-width:260px;height:auto;overflow:visible}
  .part{transition:filter .15s ease;cursor:default}
  .clickable .part{cursor:pointer}
  .clickable .part:hover{filter:brightness(1.18) drop-shadow(0 0 6px #7db9ff)}
  .glow{fill:#FFD51E!important;stroke:#E07B00!important;stroke-width:5!important;
    filter:drop-shadow(0 0 8px #FFC400) drop-shadow(0 0 18px #FFB300);
    animation:pulseGlow 1s ease-in-out infinite}
  .ok-glow{fill:#8BE36A!important;stroke:#2f7d1c!important;stroke-width:5!important;
    filter:drop-shadow(0 0 8px #5ad13a) drop-shadow(0 0 16px #5ad13a)}
  @keyframes pulseGlow{
    0%,100%{filter:drop-shadow(0 0 6px #FFC400) drop-shadow(0 0 12px #FFB300)}
    50%{filter:drop-shadow(0 0 14px #FFC400) drop-shadow(0 0 28px #FFB300)}
  }

  .bigword{font-weight:bold;font-size:2.2rem;color:var(--navy);text-align:center;margin:8px 0 2px}
  .enword{text-align:center;color:#6b7280;font-weight:bold;font-size:1.18rem;margin:0 0 4px}
  .say{text-align:center;color:#9aa3b2;font-style:italic;margin:0 0 8px}
  .listen{display:block;margin:10px auto;border:0;background:var(--teal);color:#fff;font-family:inherit;
    font-weight:bold;font-size:1.05rem;border-radius:999px;padding:10px 20px;cursor:pointer}
  .listen:hover{filter:brightness(1.05)}

  .navrow{display:flex;justify-content:center;gap:10px;margin-top:14px;flex-wrap:wrap}
  .nav{border:0;background:#eef2fb;color:var(--navy);font-family:inherit;font-weight:bold;font-size:1.05rem;
    border-radius:14px;padding:11px 20px;cursor:pointer}
  .nav:hover{background:#e2e8f7}
  .nav.primary{background:var(--green);color:#fff}
  .nav.primary:hover{filter:brightness(1.05)}
  .progress{text-align:center;color:#9aa3b2;font-weight:bold;margin-top:8px}

  .opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
  @media (max-width:480px){.opts{grid-template-columns:1fr}}
  .opt{border:3px solid #e6eaf3;background:#fff;border-radius:16px;padding:15px;font-family:inherit;
    font-weight:bold;font-size:1.3rem;color:var(--navy);cursor:pointer;transition:transform .1s, border-color .1s, background .1s}
  .opt:hover{transform:translateY(-2px);border-color:#c9d4ea}
  .opt.correct{border-color:var(--green);background:#eafbe3;color:var(--green-d)}
  .opt.wrong{border-color:#e3a0a0;background:#fdecec;animation:shake .35s}
  .opt:disabled{cursor:default}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

  .feedback{text-align:center;font-weight:bold;font-size:1.2rem;min-height:1.6em;margin-top:10px}
  .feedback.good{color:var(--green-d)}.feedback.bad{color:#c0392b}

  .prompt{text-align:center;background:#eef2fb;border-radius:16px;padding:14px;margin:6px 0 2px}
  .prompt .w{font-weight:bold;font-size:1.8rem;color:var(--navy)}
  .prompt .e{color:#6b7280;font-weight:bold}
  .countsent{font-weight:bold;font-size:1.75rem;color:var(--navy);text-align:center;margin:8px 0}
  .countsent .blank{color:var(--green);border-bottom:4px dotted var(--green);padding:0 26px}

  .namecard{max-width:340px;margin:10px auto 0;text-align:center;background:#fffbe8;border:3px solid #ffd984;
    border-radius:18px;padding:12px 16px;box-shadow:var(--shadow)}
  .namecard .ro{font-weight:bold;font-size:1.85rem;color:var(--navy)}
  .namecard .en{color:#6b7280;font-weight:bold;font-size:1.1rem}
  .namecard .ph{color:#9aa3b2;font-style:italic}
  .namecard.empty{background:#f4f6fb;border-color:#dfe5f1;color:#8a93a6;font-weight:bold}

  .matchgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 18px;margin-top:6px}
  .mcol{display:flex;flex-direction:column;gap:10px}
  .mcard{border:3px solid #e6eaf3;background:#fff;border-radius:14px;padding:13px;cursor:pointer;
    font-weight:bold;font-size:1.05rem;color:var(--navy);transition:border-color .1s, background .1s}
  .mcard:hover{border-color:#c9d4ea}
  .mcard.sel{border-color:var(--teal);background:#e2f2f3}
  .mcard.done{border-color:var(--green);background:#eafbe3;color:var(--green-d);cursor:default;opacity:.85}

  .end{text-align:center;padding:20px 6px}
  .end .big{font-weight:bold;font-size:2rem;color:var(--navy)}
  .end .score{font-size:3rem;margin:6px 0}
  .footnote{text-align:center;color:#9aa3b2;font-weight:bold;font-size:.9rem;margin-top:22px}

  @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}
</style>

<div class="wrap">
  <div class="top">
    <div class="logo"><span class="em">🦜</span> Romanian with Georgiana</div>
    <button id="homeBtn" class="home-btn hidden">🏠 Acasă</button>
    <div class="stars" id="stars">⭐ 0</div>
  </div>
  <p class="brand-sub">Corpul · The Body — joc interactiv pentru copii</p>
  <div id="screen"></div>
  <div class="footnote">Romanian with Georgiana · cu Pip papagalul 🦜 · spune cuvintele cu voce tare!</div>
</div>

    '<circle data-part="degetpic" class="part" cx="172" cy="50" r="14" fill="#F6CFA9" stroke="#E5AE80" stroke-width="2"/>'+
    '<circle data-part="degetpic" class="part" cx="198" cy="56" r="12" fill="#F6CFA9" stroke="#E5AE80" stroke-width="2"/>'+

    '<ellipse data-part="unghiepic" class="part" cx="172" cy="43" rx="7" ry="5" fill="#F9E8D6" stroke="#D9B89B" stroke-width="2"/>'+

var SCENES = {
  body:{label:'🧍 Corpul',   svg:bodySVG, clicks:['cap','ochi','ureche','nas','gura','gat','umar','brat','cot','mana','burta','picior','genunchi','talpa']},
  face:{label:'🙂 Fața',     svg:faceSVG, clicks:['par','fata','frunte','ochi','ureche','nas','gura','dinti','limba','barbie']},
  hand:{label:'✋ Mâna',     svg:handSVG, clicks:['palma','deget','unghie']},
  foot:{label:'🦶 Piciorul', svg:footSVG, clicks:['degetpic','unghiepic','talpa','calcai']}
};
var SCENE_KEYS = ['body','face','hand','foot'];

/* ---------------- state & plumbing ---------------- */
var stars = 0;
function addStars(n){ stars += n; document.getElementById('stars').textContent = '⭐ ' + stars; }
var screenEl = document.getElementById('screen');
var homeBtn = document.getElementById('homeBtn');
homeBtn.onclick = goHome;

function roVoice(){
  if(!window.speechSynthesis) return null;
  var vs = speechSynthesis.getVoices() || [];
  for(var i=0;i<vs.length;i++){ if(vs[i].lang && vs[i].lang.toLowerCase().indexOf('ro')===0) return vs[i]; }
  return null;
}
if(window.speechSynthesis){ speechSynthesis.onvoiceschanged = function(){ roVoice(); }; }
function speak(text){
  if(!window.speechSynthesis){ return; }
  try{
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = 'ro-RO'; u.rate = 0.85; u.pitch = 1.05;
    var v = roVoice(); if(v) u.voice = v;
    speechSynthesis.speak(u);
  }catch(e){}
}
function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t;} return a; }
function el(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }
var GOOD=['Bravo! 🎉','Super! 🌟','Excelent! 👏','Așa da! ✨','Grozav! 🦜'];
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function clearGlow(root){ root.querySelectorAll('.glow,.ok-glow').forEach(function(n){ n.classList.remove('glow','ok-glow'); }); }
function glow(root,id,cls){ clearGlow(root); root.querySelectorAll('[data-part="'+id+'"]').forEach(function(n){ n.classList.add(cls||'glow'); }); }
function setScreen(node, showHome){ screenEl.innerHTML=''; screenEl.appendChild(node); homeBtn.classList.toggle('hidden', !showHome); window.scrollTo(0,0); }
function pipBubble(msg){ return '<div class="pip"><div class="bird">🦜</div><div class="bubble">'+msg+'</div></div>'; }

/* scene tab helpers */
function tabsHTML(){ return '<div class="tabs">'+SCENE_KEYS.map(function(k){return '<button class="tab" data-sc="'+k+'">'+SCENES[k].label+'</button>';}).join('')+'</div>'; }
function bindTabs(node, onSwitch){
  node.querySelectorAll('.tab').forEach(function(tb){
    tb.onclick=function(){ setActiveTab(node, tb.getAttribute('data-sc')); onSwitch(tb.getAttribute('data-sc')); };
  });
}
function setActiveTab(node, key){
  node.querySelectorAll('.tab').forEach(function(tb){ tb.classList.toggle('on', tb.getAttribute('data-sc')===key); });
}
function renderScene(node, key){
  var stg=node.querySelector('.stage'); stg.innerHTML=SCENES[key].svg();
}

/* ---------------- HOME ---------------- */
function goHome(){
  var node = el(
    '<div>'+
    pipBubble('Salut! Eu sunt <b>Pip</b>. Acum avem și fața, mâna și piciorul de aproape — cu degete, unghii, dinți și limbă! 🎉')+
    '<div class="grid">'+
      tile('t0','🔍','Explorează','Apasă pe corp, față, mână, picior','explore')+
      tile('t1','📇','Învață','Cartonașe cu poză + audio','learn')+
      tile('t2','❓','Ce este?','Alege cuvântul potrivit','name')+
      tile('t3','👆','Atinge partea!','Dă clic pe partea cerută','touch')+
      tile('t4','🔢','Numără!','doi sau două?','count')+
      tile('t5','🔗','Potrivește','Propoziții RO ↔ EN','match')+
    '</div></div>'
  );
  node.querySelectorAll('.tile').forEach(function(b){ b.onclick=function(){ openActivity(b.getAttribute('data-act')); }; });
  setScreen(node, false);
}
function tile(cls,ic,title,sub,act){
  return '<button class="tile '+cls+'" data-act="'+act+'"><span class="ic">'+ic+'</span>'+
    '<span><h3>'+title+'</h3><p>'+sub+'</p></span></button>';
}
function openActivity(a){
  if(a==='explore') return exploreActivity();
  if(a==='learn') return learnActivity();
  if(a==='name')  return nameActivity();
  if(a==='touch') return touchActivity();
  if(a==='count') return countActivity();
  if(a==='match') return matchActivity();
}

/* ---------------- 0) EXPLORE ---------------- */
function exploreActivity(){
  var totalIds = {};
  SCENE_KEYS.forEach(function(k){ SCENES[k].clicks.forEach(function(id){ totalIds[id]=true; }); });
  var TOTAL = Object.keys(totalIds).length;
  var found = {};
  var current='body';
  var node = el(
    '<div class="panel">'+
      '<h2>🔍 Explorează</h2><p class="sub">Tap any part — its name appears! Switch views to find fingers, toes, nails…</p>'+
      tabsHTML()+
      '<div class="stage clickable"></div>'+
      '<div class="namecard empty" id="xcard">👆 Apasă pe o parte!</div>'+
      '<div class="progress" id="xpg"></div>'+
    '</div>'
  );
  function renderCard(p){
    var card=node.querySelector('#xcard');
    card.className='namecard';
    card.innerHTML='<div class="ro">'+p.ro+'</div><div class="en">'+p.en+'</div>'+
      '<div class="ph">/ '+p.say+' /</div>'+
      '<button class="listen" id="xl" style="margin:8px auto 0">🔊 Ascultă</button>';
    card.querySelector('#xl').onclick=function(){ speak(p.ro); };
  }
  function renderProgress(){
    var n=Object.keys(found).length;
    node.querySelector('#xpg').textContent = (n===TOTAL) ? '⭐ Le-ai descoperit pe toate! Bravo!' : 'Ai descoperit '+n+' / '+TOTAL+' părți';
  }
  function switchScene(k){ current=k; renderScene(node,k); }
  bindTabs(node, switchScene); setActiveTab(node,'body'); renderScene(node,'body');
  node.querySelector('.stage').addEventListener('click', function(ev){
    var target = ev.target.closest('.part'); if(!target) return;
    var id = target.getAttribute('data-part'); var p=byId[id]; if(!p) return;
    glow(node.querySelector('.stage'),id);
    renderCard(p); speak(p.ro);
    if(!found[id]){ found[id]=true; addStars(1); }
    renderProgress();
  });
  setScreen(node,true); renderProgress();
}

/* ---------------- 1) LEARN ---------------- */
function learnActivity(){
  var order = PARTS.slice(); var i=0;
  var node = el(
    '<div class="panel">'+
      '<h2>📇 Învață</h2><p class="sub">Look, listen and say it out loud! The view changes by itself.</p>'+
      '<div class="stage"></div>'+
      '<div class="bigword" id="lw"></div>'+
      '<div class="enword" id="le"></div>'+
      '<div class="say" id="ls"></div>'+
      '<button class="listen" id="lp">🔊 Ascultă</button>'+
      '<div class="navrow">'+
        '<button class="nav" id="lprev">◀ Înapoi</button>'+
        '<button class="nav primary" id="lnext">Următor ▶</button>'+
      '</div>'+
      '<div class="progress" id="lpg"></div>'+
    '</div>'
  );
  function render(){
    var p=order[i];
    renderScene(node,p.scene);
    glow(node.querySelector('.stage'),p.id);
    node.querySelector('#lw').textContent=p.ro;
    node.querySelector('#le').textContent=p.en;
    node.querySelector('#ls').textContent='/ '+p.say+' /';
    node.querySelector('#lpg').textContent=(i+1)+' / '+order.length;
    node.querySelector('#lprev').disabled = (i===0);
  }
  node.querySelector('#lp').onclick=function(){ speak(order[i].ro); };
  node.querySelector('#lprev').onclick=function(){ if(i>0){i--;render();} };
  node.querySelector('#lnext').onclick=function(){ if(i<order.length-1){i++;render();} else { addStars(2); goHome(); } };
  setScreen(node,true); render();
}

/* ---------------- 2) NAME (Ce este?) ---------------- */
function nameActivity(){
  var qs = shuffle(PARTS).slice(0,10); var i=0; var got=0;
  var node = el(
    '<div class="panel">'+
      '<h2>❓ Ce este?</h2><p class="sub">Look at the golden glowing part. Which word is it?</p>'+
      '<div class="stage"></div>'+
      '<div class="opts" id="nopts"></div>'+
      '<div class="feedback" id="nf"></div>'+
      '<div class="progress" id="npg"></div>'+
    '</div>'
  );
  function ask(){
    var q=qs[i];
    renderScene(node,q.scene);
    glow(node.querySelector('.stage'),q.id);
    node.querySelector('#nf').textContent=''; node.querySelector('#nf').className='feedback';
    node.querySelector('#npg').textContent=(i+1)+' / '+qs.length+'  ·  ⭐ '+got;
    var others = shuffle(PARTS.filter(function(p){return p.id!==q.id;})).slice(0,2);
    var options = shuffle([q].concat(others));
    var box=node.querySelector('#nopts'); box.innerHTML='';
    options.forEach(function(op){
      var btn=el('<button class="opt">'+op.ro+'</button>');
      btn.onclick=function(){ choose(btn,op,q); };
      box.appendChild(btn);
    });
  }
  function choose(btn,op,q){
    var btns=node.querySelectorAll('.opt');
    if(op.id===q.id){
      btn.classList.add('correct'); got++; addStars(1);
      glow(node.querySelector('.stage'),q.id,'ok-glow'); speak(q.ro);
      btns.forEach(function(b){b.disabled=true;});
      var f=node.querySelector('#nf'); f.className='feedback good'; f.textContent=pick(GOOD)+'  '+q.ro+' = '+q.en;
      setTimeout(function(){ i++; if(i<qs.length) ask(); else endScreen('Ce este?', got, qs.length, nameActivity); }, 1100);
    }else{
      btn.classList.add('wrong'); btn.disabled=true;
      var f2=node.querySelector('#nf'); f2.className='feedback bad'; f2.textContent='Mai încearcă! 🙂';
    }
  }
  setScreen(node,true); ask();
}

/* ---------------- 3) TOUCH ---------------- */
function touchActivity(){
  var pool=[];
  SCENE_KEYS.forEach(function(k){ SCENES[k].clicks.forEach(function(id){ pool.push({scene:k,id:id}); }); });
  var qs = shuffle(pool).slice(0,10); var i=0; var got=0;
  var node = el(
    '<div class="panel">'+
      '<h2>👆 Atinge partea!</h2><p class="sub">Click the right part. Watch the view — it changes!</p>'+
      '<div class="prompt"><span class="w" id="tw"></span> <button class="listen" id="tp" style="display:inline-block;padding:5px 12px;margin:0 0 0 8px;vertical-align:middle">🔊</button><div class="e" id="te"></div></div>'+
      '<div class="stage clickable"></div>'+
      '<div class="feedback" id="tf"></div>'+
      '<div class="progress" id="tpg"></div>'+
    '</div>'
  );
  function ask(){
    var q=qs[i]; var p=byId[q.id];
    renderScene(node,q.scene);
    node.querySelector('#tw').textContent='Atinge: '+p.ro;
    node.querySelector('#te').textContent='('+p.en+')';
    node.querySelector('#tf').textContent=''; node.querySelector('#tf').className='feedback';
    node.querySelector('#tpg').textContent=(i+1)+' / '+qs.length+'  ·  ⭐ '+got;
    node.querySelector('#tp').onclick=function(){ speak(p.ro); };
  }
  node.querySelector('.stage').addEventListener('click', function(ev){
    var target = ev.target.closest('.part'); if(!target) return;
    var clicked = target.getAttribute('data-part'); var q=qs[i]; var p=byId[q.id];
    if(clicked===q.id){
      glow(node.querySelector('.stage'),q.id,'ok-glow'); got++; addStars(1); speak(p.ro);
      var f=node.querySelector('#tf'); f.className='feedback good'; f.textContent=pick(GOOD);
      setTimeout(function(){ i++; if(i<qs.length) ask(); else endScreen('Atinge partea!', got, qs.length, touchActivity); }, 950);
    }else{
      var f2=node.querySelector('#tf'); f2.className='feedback bad'; f2.textContent='Hopa! Mai caută. 🙂';
    }
  });
  setScreen(node,true); ask();
}

/* ---------------- 4) COUNT ---------------- */
function countActivity(){
  var qs = shuffle(COUNT_ITEMS); var i=0; var got=0;
  var node = el(
    '<div class="panel">'+
      '<h2>🔢 Numără!</h2><p class="sub">doi for boy-words, două for girl-words.</p>'+
      '<div class="countsent" id="cs"></div>'+
      '<div class="enword" id="ce"></div>'+
      '<div class="opts" id="copts" style="grid-template-columns:1fr 1fr;max-width:420px;margin:10px auto 0">'+
        '<button class="opt" data-v="doi">doi</button>'+
        '<button class="opt" data-v="două">două</button>'+
      '</div>'+
      '<div class="feedback" id="cf"></div>'+
      '<div class="progress" id="cpg"></div>'+
    '</div>'
  );
  function ask(){
    var q=qs[i];
    node.querySelector('#cs').innerHTML='Am <span class="blank">?</span> '+q.word+'.';
    node.querySelector('#ce').textContent='('+q.en+')';
    node.querySelector('#cf').textContent=''; node.querySelector('#cf').className='feedback';
    node.querySelector('#cpg').textContent=(i+1)+' / '+qs.length+'  ·  ⭐ '+got;
    node.querySelectorAll('.opt').forEach(function(b){ b.className='opt'; b.disabled=false;
      b.onclick=function(){ choose(b,q); }; });
  }
  function choose(b,q){
    var v=b.getAttribute('data-v');
    if(v===q.answer){
      b.classList.add('correct'); got++; addStars(1);
      node.querySelector('#cs').innerHTML='Am <span class="blank" style="border:none">'+q.answer+'</span> '+q.word+'.';
      speak('Am '+q.answer+' '+q.word);
      node.querySelectorAll('.opt').forEach(function(x){x.disabled=true;});
      var f=node.querySelector('#cf'); f.className='feedback good'; f.textContent=pick(GOOD);
      setTimeout(function(){ i++; if(i<qs.length) ask(); else endScreen('Numără!', got, qs.length, countActivity); }, 1050);
    }else{
      b.classList.add('wrong'); b.disabled=true;
      var f2=node.querySelector('#cf'); f2.className='feedback bad'; f2.textContent='Mai încearcă! 🙂';
    }
  }
  setScreen(node,true); ask();
}

/* ---------------- 5) MATCH ---------------- */
function matchActivity(){
  var pairs = shuffle(MATCH_PAIRS).slice(0,5);
  var left = shuffle(pairs.map(function(p,idx){return {k:idx,txt:p.ro};}));
  var right= shuffle(pairs.map(function(p,idx){return {k:idx,txt:p.en};}));
  var node = el(
    '<div class="panel">'+
      '<h2>🔗 Potrivește</h2><p class="sub">Tap a Romanian sentence, then its English match.</p>'+
      '<div class="matchgrid">'+
        '<div class="mcol" id="mL"></div>'+
        '<div class="mcol" id="mR"></div>'+
      '</div>'+
      '<div class="feedback" id="mf"></div>'+
    '</div>'
  );
  var L=node.querySelector('#mL'), R=node.querySelector('#mR');
  left.forEach(function(o){ var c=el('<div class="mcard">'+o.txt+'</div>'); c.dataset.k=o.k; c.dataset.side='L'; L.appendChild(c); });
  right.forEach(function(o){ var c=el('<div class="mcard">'+o.txt+'</div>'); c.dataset.k=o.k; c.dataset.side='R'; R.appendChild(c); });
  var selL=null, selR=null, done=0;
  function tryMatch(){
    if(!selL||!selR) return;
    var a=selL, b=selR;
    if(a.dataset.k===b.dataset.k){
      a.classList.add('done'); b.classList.add('done'); a.classList.remove('sel'); b.classList.remove('sel');
      speak(pairs[a.dataset.k].ro); addStars(1); done++; selL=null; selR=null;
      var f=node.querySelector('#mf'); f.className='feedback good'; f.textContent=pick(GOOD);
      if(done===pairs.length){ setTimeout(function(){ endScreen('Potrivește', done, pairs.length, matchActivity); }, 800); }
    }else{
      var bad=a, bad2=b;
      node.querySelector('#mf').className='feedback bad'; node.querySelector('#mf').textContent='Nu se potrivesc. Mai încearcă!';
      setTimeout(function(){ if(!bad.classList.contains('done'))bad.classList.remove('sel'); if(!bad2.classList.contains('done'))bad2.classList.remove('sel'); }, 500);
      selL=null; selR=null;
    }
  }
  node.querySelectorAll('.mcard').forEach(function(c){
    c.onclick=function(){
      if(c.classList.contains('done')) return;
      if(c.dataset.side==='L'){ if(selL)selL.classList.remove('sel'); selL=c; }
      else { if(selR)selR.classList.remove('sel'); selR=c; }
      c.classList.add('sel'); tryMatch();
    };
  });
  setScreen(node,true);
}

/* ---------------- END screen ---------------- */
function endScreen(name, got, total, again){
  var msg = got===total ? 'Perfect! Ai răspuns la toate! 🏆' : (got>=Math.ceil(total/2) ? 'Foarte bine! 🌟' : 'Bun început! Mai exersează puțin. 🙂');
  var node = el(
    '<div class="panel"><div class="end">'+
      '<div class="big">'+name+'</div>'+
      '<div class="score">⭐ '+got+' / '+total+'</div>'+
      '<div style="font-weight:bold;color:#6b7280;font-size:1.15rem">'+msg+'</div>'+
      '<div class="navrow">'+
        '<button class="nav primary" id="eAgain">Joacă din nou 🔄</button>'+
        '<button class="nav" id="eHome">Alt joc 🏠</button>'+
      '</div>'+
    '</div></div>'
  );
  node.querySelector('#eAgain').onclick=function(){ again(); };
  node.querySelector('#eHome').onclick=goHome;
  setScreen(node,true);
}

/* boot */
if(window.speechSynthesis){ try{ speechSynthesis.getVoices(); }catch(e){} }
goHome();
</script>
