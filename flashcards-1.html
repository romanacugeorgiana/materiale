<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romanian Flashcards</title>
<style>
  :root { --bg:#f4f1eb; --accent:#e94560; --accent2:#0f3460; --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px; }
  header { text-align:center; margin-bottom:24px; }
  header h1 { font-size:1.8rem; color:var(--accent2); }
  header p  { color:#666; margin-top:4px; font-size:.95rem; }
  .categories { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:20px; max-width:620px; }
  .cat-btn { padding:7px 14px; border:2px solid var(--accent2); background:white; color:var(--accent2); border-radius:999px; cursor:pointer; font-size:.82rem; font-weight:600; transition:all .2s; }
  .cat-btn.active { background:var(--accent2); color:white; }
  .cat-btn:hover { opacity:.8; }
  .progress-bar-wrap { width:100%; max-width:500px; background:#ddd; border-radius:999px; height:8px; margin-bottom:10px; overflow:hidden; }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:999px; transition:width .4s ease; }
  .progress-text { font-size:.82rem; color:#888; margin-bottom:20px; text-align:center; }
  .card-scene { width:340px; height:200px; perspective:1000px; cursor:pointer; margin-bottom:20px; }
  .card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.4,0,.2,1); }
  .card-scene.flipped .card-inner { transform:rotateY(180deg); }
  .card-face { position:absolute; width:100%; height:100%; border-radius:20px; backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px; box-shadow:0 8px 32px rgba(0,0,0,.15); gap:8px; }
  .card-front { background:linear-gradient(135deg,var(--accent2) 0%,#1a1a2e 100%); color:#fff; }
  .card-back  { background:linear-gradient(135deg,var(--accent) 0%,#c0392b 100%); color:#fff; transform:rotateY(180deg); }
  .card-label { font-size:.68rem; text-transform:uppercase; letter-spacing:2px; opacity:.5; }
  .card-word  { font-size:1.8rem; font-weight:700; text-align:center; line-height:1.2; }
  .flip-hint  { font-size:.68rem; opacity:.35; letter-spacing:1px; }
  .know-row { display:flex; gap:12px; margin-bottom:16px; }
  .btn-know { width:130px; padding:12px; border:none; border-radius:14px; font-size:1rem; font-weight:700; cursor:pointer; transition:transform .15s; }
  .btn-know:active { transform:scale(.95); }
  .btn-yes { background:var(--green); color:white; }
  .btn-no  { background:var(--red);   color:white; }
  .score-row { display:flex; gap:24px; font-size:.83rem; color:#666; margin-bottom:18px; }
  .score-item { text-align:center; }
  .score-num { font-size:1.4rem; font-weight:700; display:block; }
  .score-num.green { color:var(--green); }
  .score-num.red   { color:var(--red); }
  .score-num.blue  { color:var(--accent2); }
  .btn-row { display:flex; gap:10px; margin-bottom:20px; }
  .btn { padding:9px 20px; border:none; border-radius:12px; font-size:.88rem; font-weight:600; cursor:pointer; transition:transform .15s; }
  .btn:active { transform:scale(.95); }
  .btn-prev    { background:#e0e0e0; color:#444; }
  .btn-next    { background:var(--accent2); color:white; }
  .btn-shuffle { background:var(--yellow); color:white; }
  .review-banner { background:#fff3cd; border:1px solid #ffc107; border-radius:10px; padding:8px 16px; font-size:.82rem; color:#856404; margin-bottom:14px; display:none; }
  .review-banner.visible { display:block; }
  .completion { display:none; flex-direction:column; align-items:center; text-align:center; padding:40px 20px; }
  .completion.visible { display:flex; }
  .completion h2 { font-size:2rem; color:var(--accent2); margin-bottom:8px; }
  .completion p  { color:#666; margin-bottom:24px; }
  .btn-restart { background:var(--accent); color:white; padding:14px 32px; border-radius:14px; border:none; font-size:1rem; font-weight:700; cursor:pointer; }
  #main-content { display:flex; flex-direction:column; align-items:center; width:100%; }
  #main-content.hidden { display:none; }
  @media(max-width:400px){ .card-scene{width:300px;} .card-word{font-size:1.5rem;} }
</style>
</head>
<body>
<header>
  <h1>🇷🇴 Romanian Flashcards</h1>
  <p>Tap a card to reveal the translation</p>
</header>
<div class="categories" id="catBtns"></div>
<div class="review-banner" id="reviewBanner">🔄 Review Mode — only cards marked "Don't know"</div>
<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-text" id="progressText"></div>
<div id="main-content">
  <div class="card-scene" id="cardScene" onclick="flipCard()">
    <div class="card-inner">
      <div class="card-face card-front">
        <div class="card-label" id="frontLabel">ROMANIAN</div>
        <div class="card-word"  id="frontWord"></div>
        <div class="flip-hint">▸ tap to see translation</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">ENGLISH</div>
        <div class="card-word" id="backWord"></div>
        <div class="flip-hint">▸ tap to see Romanian</div>
      </div>
    </div>
  </div>
  <div class="know-row">
    <button class="btn-know btn-no"  onclick="markCard(false)">&#10007; Don't know</button>
    <button class="btn-know btn-yes" onclick="markCard(true)">&#10003; I know</button>
  </div>
  <div class="score-row">
    <div class="score-item"><span class="score-num green" id="scoreYes">0</span>Know</div>
    <div class="score-item"><span class="score-num red"   id="scoreNo">0</span>Don't know</div>
    <div class="score-item"><span class="score-num blue"  id="scoreLeft">0</span>Left</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-prev"    onclick="prevCard()">&#8592; Back</button>
    <button class="btn btn-shuffle" onclick="shuffleCards()">&#128256; Shuffle</button>
    <button class="btn btn-next"    onclick="nextCard()">Next &#8594;</button>
  </div>
</div>
<div class="completion" id="completion">
  <div style="font-size:4rem">&#127881;</div>
  <h2>Well done!</h2>
  <p id="completionMsg"></p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn-restart" onclick="restartAll()">&#128257; Restart</button>
    <button class="btn-restart" style="background:var(--red)" onclick="reviewWrong()">&#10007; Review mistakes</button>
  </div>
</div>
<script>
// Romanian "a avea" built from char codes to avoid any encoding confusion:
// a(97) v(118) e(101) a(97)
const AVOIR = String.fromCharCode(97,118,101,97); // → "avea"
const A_AVOIR = "a " + AVOIR;                     // → "a avea"
const A_AVOIR_CAT = "A " + AVOIR.toUpperCase() + " Expressions"; // → "A AVEA Expressions"

function expr(rest, en) {
  return { ro: A_AVOIR + " " + rest, en: en, cat: A_AVOIR_CAT };
}

const ALL_CARDS = [
  // VERBS
  { ro:"a fi",                  en:"to be",                            cat:"Verbs" },
  { ro:"a avea",                en:"to have",                          cat:"Verbs" },
  { ro:"a face",                en:"to do / to make",                  cat:"Verbs" },
  { ro:"a spune / a zice",      en:"to say / to tell",                 cat:"Verbs" },
  { ro:"a merge",               en:"to go / to walk",                  cat:"Verbs" },
  { ro:"a veni",                en:"to come",                          cat:"Verbs" },
  { ro:"a da",                  en:"to give",                          cat:"Verbs" },
  { ro:"a lua",                 en:"to take",                          cat:"Verbs" },
  { ro:"a vedea",               en:"to see",                           cat:"Verbs" },
  { ro:"a ști",                 en:"to know",                          cat:"Verbs" },
  { ro:"a vorbi",               en:"to speak / to talk",               cat:"Verbs" },
  { ro:"a înțelege",            en:"to understand",                    cat:"Verbs" },
  { ro:"a întreba",             en:"to ask",                           cat:"Verbs" },
  { ro:"a răspunde",            en:"to answer / to respond",           cat:"Verbs" },
  { ro:"a vrea",                en:"to want",                          cat:"Verbs" },
  { ro:"a putea",               en:"to be able to / can",              cat:"Verbs" },
  { ro:"a trebui",              en:"to have to / must",                cat:"Verbs" },
  { ro:"a mânca",               en:"to eat",                           cat:"Verbs" },
  { ro:"a găti",                en:"to cook",                          cat:"Verbs" },
  { ro:"a cumpăra",             en:"to buy",                           cat:"Verbs" },
  { ro:"a plăcea",              en:"to like",                          cat:"Verbs" },
  { ro:"a iubi",                en:"to love",                          cat:"Verbs" },
  { ro:"a lucra",               en:"to work",                          cat:"Verbs" },
  { ro:"a se uita (la)",        en:"to watch / to look at",            cat:"Verbs" },
  { ro:"a termina",             en:"to finish / to end",               cat:"Verbs" },
  { ro:"a începe",              en:"to start / to begin",              cat:"Verbs" },
  { ro:"a rămâne",              en:"to stay / to remain",              cat:"Verbs" },
  { ro:"a ieși",                en:"to go out / to exit",              cat:"Verbs" },
  { ro:"a intra",               en:"to enter / to go in",              cat:"Verbs" },
  { ro:"a deschide",            en:"to open",                          cat:"Verbs" },
  { ro:"a închide",             en:"to close",                         cat:"Verbs" },
  { ro:"a tăia",                en:"to cut",                           cat:"Verbs" },
  { ro:"a pune",                en:"to put / to place",                cat:"Verbs" },
  { ro:"a suna",                en:"to call / to ring",                cat:"Verbs" },
  { ro:"a ajunge",              en:"to arrive / to get somewhere",     cat:"Verbs" },
  { ro:"a hotărî",              en:"to decide",                        cat:"Verbs" },
  { ro:"a dormi",               en:"to sleep",                         cat:"Verbs" },
  { ro:"a petrece timp",        en:"to spend time",                    cat:"Verbs" },
  { ro:"a pierde timp",         en:"to waste time",                    cat:"Verbs" },
  { ro:"a locui",               en:"to live (in a place)",             cat:"Verbs" },
  { ro:"a trăi",                en:"to live (have a life)",            cat:"Verbs" },
  { ro:"a plăti",               en:"to pay",                           cat:"Verbs" },
  { ro:"a striga",              en:"to shout / to call out",           cat:"Verbs" },
  { ro:"a se calma",            en:"to calm down",                     cat:"Verbs" },
  { ro:"a încerca",             en:"to try",                           cat:"Verbs" },
  { ro:"a se întoarce",         en:"to return / to go back",           cat:"Verbs" },
  { ro:"a se întâmpla",         en:"to happen",                        cat:"Verbs" },
  { ro:"a părea",               en:"to seem / to appear",              cat:"Verbs" },
  { ro:"a coborî",              en:"to go down / to get off",          cat:"Verbs" },

  // PEOPLE & PROFESSIONS
  { ro:"om / oameni",           en:"person / people",                  cat:"People & Professions" },
  { ro:"bărbat",                en:"man",                              cat:"People & Professions" },
  { ro:"femeie",                en:"woman",                            cat:"People & Professions" },
  { ro:"băiat",                 en:"boy",                              cat:"People & Professions" },
  { ro:"fată",                  en:"girl",                             cat:"People & Professions" },
  { ro:"copil",                 en:"child",                            cat:"People & Professions" },
  { ro:"prieten / prietenă",    en:"friend (m / f)",                   cat:"People & Professions" },
  { ro:"coleg / colegă",        en:"colleague (m / f)",                cat:"People & Professions" },
  { ro:"profesor / profesoară", en:"teacher (m / f)",                  cat:"People & Professions" },
  { ro:"doctor / doctoriță",    en:"doctor (m / f)",                   cat:"People & Professions" },
  { ro:"chelner / chelnerită",  en:"waiter / waitress",                cat:"People & Professions" },
  { ro:"șofer / șoferiță",      en:"driver (m / f)",                   cat:"People & Professions" },
  { ro:"muncitor / muncitoare", en:"worker (m / f)",                   cat:"People & Professions" },
  { ro:"angajat / angajată",    en:"employee (m / f)",                 cat:"People & Professions" },
  { ro:"bucătar / bucătăreasă", en:"cook / chef (m / f)",              cat:"People & Professions" },
  { ro:"vânzător / vânzătoare", en:"seller / shop assistant (m / f)", cat:"People & Professions" },
  { ro:"inginer / ingineră",    en:"engineer (m / f)",                 cat:"People & Professions" },

  // HOME & PLACES
  { ro:"casă",       en:"house",            cat:"Home & Places" },
  { ro:"cameră",     en:"room",             cat:"Home & Places" },
  { ro:"baie",       en:"bathroom",         cat:"Home & Places" },
  { ro:"dormitor",   en:"bedroom",          cat:"Home & Places" },
  { ro:"bucătărie",  en:"kitchen",          cat:"Home & Places" },
  { ro:"fereastră",  en:"window",           cat:"Home & Places" },
  { ro:"ușă",        en:"door",             cat:"Home & Places" },
  { ro:"masă",       en:"table",            cat:"Home & Places" },
  { ro:"scaun",      en:"chair",            cat:"Home & Places" },
  { ro:"birou",      en:"office / desk",    cat:"Home & Places" },
  { ro:"oglindă",    en:"mirror",           cat:"Home & Places" },
  { ro:"restaurant", en:"restaurant",       cat:"Home & Places" },
  { ro:"supermarket",en:"supermarket",      cat:"Home & Places" },
  { ro:"muzeu",      en:"museum",           cat:"Home & Places" },
  { ro:"parc",       en:"park",             cat:"Home & Places" },
  { ro:"stradă",     en:"street",           cat:"Home & Places" },
  { ro:"piață",      en:"square / market",  cat:"Home & Places" },
  { ro:"stație",     en:"station / stop",   cat:"Home & Places" },
  { ro:"metrou",     en:"subway / metro",   cat:"Home & Places" },
  { ro:"hotel",      en:"hotel",            cat:"Home & Places" },
  { ro:"oraș",       en:"city / town",      cat:"Home & Places" },
  { ro:"drum",       en:"road / journey",   cat:"Home & Places" },
  { ro:"munte",      en:"mountain",         cat:"Home & Places" },

  // FOOD & OBJECTS
  { ro:"mâncare",    en:"food",             cat:"Food & Objects" },
  { ro:"cafea",      en:"coffee",           cat:"Food & Objects" },
  { ro:"apă",        en:"water",            cat:"Food & Objects" },
  { ro:"pâine",      en:"bread",            cat:"Food & Objects" },
  { ro:"ciorbă",     en:"sour soup",        cat:"Food & Objects" },
  { ro:"pui",        en:"chicken",          cat:"Food & Objects" },
  { ro:"cartof",     en:"potato",           cat:"Food & Objects" },
  { ro:"înghețată",  en:"ice cream",        cat:"Food & Objects" },
  { ro:"dulciuri",   en:"sweets / candy",   cat:"Food & Objects" },
  { ro:"carte",      en:"book",             cat:"Food & Objects" },
  { ro:"mașină",     en:"car",              cat:"Food & Objects" },
  { ro:"telefon",    en:"phone",            cat:"Food & Objects" },
  { ro:"tigaie",     en:"frying pan",       cat:"Food & Objects" },
  { ro:"farfurie",   en:"plate",            cat:"Food & Objects" },
  { ro:"pahar",      en:"glass / cup",      cat:"Food & Objects" },
  { ro:"cheie",      en:"key",              cat:"Food & Objects" },
  { ro:"geantă",     en:"bag / purse",      cat:"Food & Objects" },
  { ro:"coș",        en:"basket",           cat:"Food & Objects" },

  // TIME
  { ro:"zi",           en:"day",                       cat:"Time" },
  { ro:"dimineață",    en:"morning",                   cat:"Time" },
  { ro:"prânz",        en:"noon / lunch",              cat:"Time" },
  { ro:"după-amiază",  en:"afternoon",                 cat:"Time" },
  { ro:"seară",        en:"evening",                   cat:"Time" },
  { ro:"noapte",       en:"night",                     cat:"Time" },
  { ro:"săptămână",    en:"week",                      cat:"Time" },
  { ro:"lună",         en:"month / moon",              cat:"Time" },
  { ro:"an",           en:"year",                      cat:"Time" },
  { ro:"azi / astăzi", en:"today",                     cat:"Time" },
  { ro:"mâine",        en:"tomorrow",                  cat:"Time" },
  { ro:"ieri",         en:"yesterday",                 cat:"Time" },
  { ro:"pomâine",      en:"the day after tomorrow",    cat:"Time" },
  { ro:"alaltăieri",   en:"the day before yesterday",  cat:"Time" },
  { ro:"acum",         en:"now",                       cat:"Time" },
  { ro:"diseară",      en:"tonight",                   cat:"Time" },

  // A AVEA EXPRESSIONS — built with AVOIR constant to guarantee correct spelling
  expr("chef (de)",       "to feel like / to be in the mood for"),
  expr("nevoie (de)",     "to need"),
  expr("grijă (de)",      "to take care of / to look after"),
  expr("timp",            "to have time"),
  expr("treabă",          "to be busy / to have things to do"),
  expr("noroc",           "to be lucky"),
  expr("dreptate",        "to be right"),
  expr("răbdare",         "to be patient"),
  expr("succes",          "to be successful"),
  expr("emoții",          "to be nervous"),
  expr("habar",           "to have a clue"),
  expr("loc",             "to take place / to happen"),
  expr("încredere (în)",  "to trust"),

  // MISCELLANEOUS
  { ro:"muncă",                en:"work (in general)",     cat:"Miscellaneous" },
  { ro:"serviciu",             en:"job / workplace",       cat:"Miscellaneous" },
  { ro:"vacanță",              en:"holiday / vacation",    cat:"Miscellaneous" },
  { ro:"timp",                 en:"time",                  cat:"Miscellaneous" },
  { ro:"noroc",                en:"luck",                  cat:"Miscellaneous" },
  { ro:"răbdare",              en:"patience",              cat:"Miscellaneous" },
  { ro:"idee",                 en:"idea",                  cat:"Miscellaneous" },
  { ro:"problemă",             en:"problem",               cat:"Miscellaneous" },
  { ro:"decizie",              en:"decision",              cat:"Miscellaneous" },
  { ro:"plan",                 en:"plan",                  cat:"Miscellaneous" },
  { ro:"energie",              en:"energy",                cat:"Miscellaneous" },
  { ro:"familie",              en:"family",                cat:"Miscellaneous" },
  { ro:"fum",                  en:"smoke",                 cat:"Miscellaneous" },
  { ro:"aer",                  en:"air",                   cat:"Miscellaneous" },
  { ro:"cumpărături",          en:"shopping / groceries",  cat:"Miscellaneous" },
  { ro:"pisică",               en:"cat",                   cat:"Miscellaneous" },
  { ro:"câine",                en:"dog",                   cat:"Miscellaneous" },
  { ro:"nota (la restaurant)", en:"the bill / the check",  cat:"Miscellaneous" },
];

const CAT_ORDER = ["All","Verbs","People & Professions","Home & Places",
                   "Food & Objects","Time", A_AVOIR_CAT, "Miscellaneous"];

let currentCat="All", deck=[], pointer=0, scoreYes=0, scoreNo=0, wrongCards=[], flipped=false;

function getFiltered(){ return currentCat==="All"?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.cat===currentCat); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function initDeck(cards){ deck=shuffle([...cards]); pointer=0; scoreYes=0; scoreNo=0; wrongCards=[];
  document.getElementById('reviewBanner').classList.remove('visible');
  document.getElementById('completion').classList.remove('visible');
  document.getElementById('main-content').classList.remove('hidden');
  showCard(); updateScore(); }
function showCard(){ if(pointer>=deck.length){showCompletion();return;}
  const c=deck[pointer];
  document.getElementById('frontLabel').textContent=c.cat.toUpperCase();
  document.getElementById('frontWord').textContent=c.ro;
  document.getElementById('backWord').textContent=c.en;
  flipped=false; document.getElementById('cardScene').classList.remove('flipped'); updateProgress(); }
function flipCard(){ flipped=!flipped; document.getElementById('cardScene').classList.toggle('flipped',flipped); }
function markCard(know){ if(pointer>=deck.length)return;
  if(know){scoreYes++;}else{scoreNo++;if(!wrongCards.find(c=>c.ro===deck[pointer].ro))wrongCards.push(deck[pointer]);}
  updateScore(); pointer++; showCard(); }
function nextCard(){ if(pointer<deck.length-1){pointer++;showCard();} }
function prevCard(){ if(pointer>0){pointer--;showCard();} }
function shuffleCards(){ const rem=deck.slice(pointer);shuffle(rem);deck=[...deck.slice(0,pointer),...rem];showCard(); }
function updateProgress(){ document.getElementById('progressBar').style.width=deck.length?(pointer/deck.length*100)+'%':'0%';
  document.getElementById('progressText').textContent=`Card ${Math.min(pointer+1,deck.length)} of ${deck.length}`; }
function updateScore(){ document.getElementById('scoreYes').textContent=scoreYes;
  document.getElementById('scoreNo').textContent=scoreNo;
  document.getElementById('scoreLeft').textContent=Math.max(0,deck.length-pointer); }
function showCompletion(){ document.getElementById('main-content').classList.add('hidden');
  document.getElementById('completion').classList.add('visible');
  const pct=deck.length?Math.round(scoreYes/deck.length*100):0;
  document.getElementById('completionMsg').textContent=
    `You got ${scoreYes} out of ${deck.length} words right (${pct}%). ${pct>=80?'🌟 Excellent!':pct>=50?'💪 Keep going!':'📚 Keep practising!'}`; }
function restartAll(){ initDeck(getFiltered()); }
function reviewWrong(){ if(!wrongCards.length){restartAll();return;}
  deck=shuffle([...wrongCards]);pointer=0;scoreYes=0;scoreNo=0;wrongCards=[];
  document.getElementById('reviewBanner').classList.add('visible');
  document.getElementById('completion').classList.remove('visible');
  document.getElementById('main-content').classList.remove('hidden');
  showCard();updateScore(); }
function buildCats(){ const container=document.getElementById('catBtns');container.innerHTML='';
  CAT_ORDER.filter(cat=>cat==="All"||ALL_CARDS.some(c=>c.cat===cat)).forEach(cat=>{
    const count=cat==="All"?ALL_CARDS.length:ALL_CARDS.filter(c=>c.cat===cat).length;
    const btn=document.createElement('button');
    btn.className='cat-btn'+(cat===currentCat?' active':'');
    btn.textContent=`${cat} (${count})`;
    btn.onclick=()=>{ currentCat=cat;
      document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); initDeck(getFiltered()); };
    container.appendChild(btn); }); }
buildCats(); initDeck(getFiltered());
</script>
</body>
</html>
