<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romanian Flashcards – Vol. 2</title>
<style>
  :root { --bg:#f4f1eb; --accent:#e94560; --accent2:#0f3460; --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12; }
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:16px 12px 32px; touch-action:manipulation; }
  header { text-align:center; margin-bottom:16px; }
  header h1 { font-size:1.5rem; color:var(--accent2); }
  header p  { color:#666; margin-top:3px; font-size:.85rem; }
  .categories { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:16px; width:100%; max-width:480px; }
  .cat-btn { padding:8px 13px; border:2px solid var(--accent2); background:white; color:var(--accent2); border-radius:999px; cursor:pointer; font-size:.78rem; font-weight:700; touch-action:manipulation; user-select:none; }
  .cat-btn.active { background:var(--accent2); color:white; }
  .progress-wrap { width:100%; max-width:420px; background:#ddd; border-radius:999px; height:7px; margin-bottom:8px; overflow:hidden; }
  .progress-bar  { height:100%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:999px; transition:width .35s ease; }
  .progress-text { font-size:.78rem; color:#888; margin-bottom:16px; text-align:center; }
  .card-wrap { width:100%; max-width:420px; height:180px; position:relative; margin-bottom:18px; cursor:pointer; user-select:none; }
  .card { width:100%; height:100%; border-radius:20px; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; gap:8px; box-shadow:0 6px 24px rgba(0,0,0,.15); transition:opacity .2s; position:absolute; top:0; left:0; }
  .card.front { background:linear-gradient(135deg,var(--accent2),#1a1a2e); color:#fff; }
  .card.back  { background:linear-gradient(135deg,var(--accent),#c0392b); color:#fff; opacity:0; pointer-events:none; }
  .card.show  { opacity:1; pointer-events:auto; }
  .card.hide  { opacity:0; pointer-events:none; }
  .card-label { font-size:.65rem; text-transform:uppercase; letter-spacing:2px; opacity:.5; }
  .card-word  { font-size:clamp(1.3rem,5vw,1.9rem); font-weight:700; text-align:center; line-height:1.2; }
  .flip-hint  { font-size:.65rem; opacity:.35; letter-spacing:1px; }
  .know-row { display:flex; gap:12px; margin-bottom:14px; width:100%; max-width:420px; }
  .btn-know { flex:1; padding:16px 8px; border:none; border-radius:16px; font-size:1rem; font-weight:700; cursor:pointer; touch-action:manipulation; user-select:none; transition:transform .1s,opacity .1s; }
  .btn-know:active { transform:scale(.94); opacity:.85; }
  .btn-yes { background:var(--green); color:#fff; }
  .btn-no  { background:var(--red);   color:#fff; }
  .score-row { display:flex; gap:0; margin-bottom:16px; width:100%; max-width:420px; }
  .score-item { flex:1; text-align:center; font-size:.78rem; color:#666; }
  .score-num  { font-size:1.5rem; font-weight:700; display:block; }
  .score-num.green { color:var(--green); }
  .score-num.red   { color:var(--red); }
  .score-num.blue  { color:var(--accent2); }
  .btn-row { display:flex; gap:8px; margin-bottom:16px; width:100%; max-width:420px; }
  .btn { flex:1; padding:12px 6px; border:none; border-radius:12px; font-size:.85rem; font-weight:600; cursor:pointer; touch-action:manipulation; user-select:none; transition:transform .1s; }
  .btn:active { transform:scale(.94); }
  .btn-prev    { background:#e0e0e0; color:#444; }
  .btn-next    { background:var(--accent2); color:#fff; }
  .btn-shuffle { background:var(--yellow); color:#fff; }
  .swipe-hint { font-size:.72rem; color:#aaa; margin-bottom:10px; }
  .review-banner { background:#fff3cd; border:1px solid #ffc107; border-radius:10px; padding:8px 14px; font-size:.78rem; color:#856404; margin-bottom:12px; width:100%; max-width:420px; text-align:center; display:none; }
  .review-banner.visible { display:block; }
  .completion { display:none; flex-direction:column; align-items:center; text-align:center; padding:32px 16px; width:100%; }
  .completion.visible { display:flex; }
  .completion h2 { font-size:1.8rem; color:var(--accent2); margin-bottom:8px; }
  .completion p  { color:#666; margin-bottom:24px; font-size:.9rem; padding:0 16px; }
  .btn-restart { background:var(--accent); color:#fff; padding:14px 28px; border-radius:14px; border:none; font-size:1rem; font-weight:700; cursor:pointer; touch-action:manipulation; margin:6px; }
  #main-content { display:flex; flex-direction:column; align-items:center; width:100%; }
  #main-content.hidden { display:none; }
</style>
</head>
<body>
<header>
  <h1>&#127479;&#127476; Romanian Flashcards &#8212; Vol. 2</h1>
  <p>200 new words &#183; Tap a card to flip &#183; Swipe to navigate</p>
</header>
<div class="categories" id="catBtns"></div>
<div class="review-banner" id="reviewBanner">&#128260; Review Mode &#8212; only cards marked &#8220;Don&#8217;t know&#8221;</div>
<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-text" id="progressText"></div>
<div id="main-content">
  <div class="card-wrap" id="cardWrap">
    <div class="card front show" id="cardFront">
      <div class="card-label" id="frontLabel">ROMANIAN</div>
      <div class="card-word"  id="frontWord"></div>
      <div class="flip-hint">&#9658; tap to see translation</div>
    </div>
    <div class="card back hide" id="cardBack">
      <div class="card-label">ENGLISH</div>
      <div class="card-word" id="backWord"></div>
      <div class="flip-hint">&#9658; tap to see Romanian</div>
    </div>
  </div>
  <div class="know-row">
    <button class="btn-know btn-no"  onclick="markCard(false)">&#10007; Don&#8217;t know</button>
    <button class="btn-know btn-yes" onclick="markCard(true)">&#10003; I know</button>
  </div>
  <div class="score-row">
    <div class="score-item"><span class="score-num green" id="scoreYes">0</span>Know</div>
    <div class="score-item"><span class="score-num red"   id="scoreNo">0</span>Don&#8217;t know</div>
    <div class="score-item"><span class="score-num blue"  id="scoreLeft">0</span>Left</div>
  </div>
  <div class="btn-row">
    <button class="btn btn-prev"    onclick="prevCard()">&#8592; Back</button>
    <button class="btn btn-shuffle" onclick="shuffleCards()">&#128256; Shuffle</button>
    <button class="btn btn-next"    onclick="nextCard()">Next &#8594;</button>
  </div>
  <div class="swipe-hint">&#8592; swipe to go back &nbsp;|&nbsp; swipe to go forward &#8594;</div>
</div>
<div class="completion" id="completion">
  <div style="font-size:3.5rem">&#127881;</div>
  <h2>Well done!</h2>
  <p id="completionMsg"></p>
  <div>
    <button class="btn-restart" onclick="restartAll()">&#128257; Restart</button>
    <button class="btn-restart" style="background:var(--red)" onclick="reviewWrong()">&#10007; Review mistakes</button>
  </div>
</div>

const cardFront=document.getElementById('cardFront');
const cardBack =document.getElementById('cardBack');
const frontLabel=document.getElementById('frontLabel');
const frontWord =document.getElementById('frontWord');
const backWord  =document.getElementById('backWord');

document.getElementById('cardWrap').addEventListener('click', flipCard);

let touchStartX=0, touchStartY=0;
document.getElementById('cardWrap').addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('cardWrap').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)*1.5){ if(dx<0)nextCard(); else prevCard(); }
  else if(Math.abs(dx)<10&&Math.abs(dy)<10){ flipCard(); }
},{passive:true});

function showFront(){ cardFront.classList.remove('hide');cardFront.classList.add('show');cardBack.classList.remove('show');cardBack.classList.add('hide');showing="front"; }
function flipCard(){ if(showing==="front"){cardFront.classList.remove('show');cardFront.classList.add('hide');cardBack.classList.remove('hide');cardBack.classList.add('show');showing="back";}else{showFront();} }
function getFiltered(){ return currentCat==="All"?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.cat===currentCat); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
function initDeck(cards){ deck=shuffle([...cards]);pointer=0;scoreYes=0;scoreNo=0;wrongCards=[];document.getElementById('reviewBanner').classList.remove('visible');document.getElementById('completion').classList.remove('visible');document.getElementById('main-content').classList.remove('hidden');showCard();updateScore(); }
function showCard(){ if(pointer>=deck.length){showCompletion();return;}const c=deck[pointer];frontLabel.textContent=c.cat.toUpperCase();frontWord.textContent=c.ro;backWord.textContent=c.en;showFront();updateProgress(); }
function markCard(know){ if(pointer>=deck.length)return;if(know){scoreYes++;}else{scoreNo++;if(!wrongCards.find(c=>c.ro===deck[pointer].ro))wrongCards.push(deck[pointer]);}updateScore();pointer++;showCard(); }
function nextCard(){ if(pointer<deck.length-1){pointer++;showCard();} }
function prevCard(){ if(pointer>0){pointer--;showCard();} }
function shuffleCards(){ const rem=deck.slice(pointer);shuffle(rem);deck=[...deck.slice(0,pointer),...rem];showCard(); }
function updateProgress(){ document.getElementById('progressBar').style.width=deck.length?(pointer/deck.length*100)+'%':'0%';document.getElementById('progressText').textContent='Card '+Math.min(pointer+1,deck.length)+' of '+deck.length; }
function updateScore(){ document.getElementById('scoreYes').textContent=scoreYes;document.getElementById('scoreNo').textContent=scoreNo;document.getElementById('scoreLeft').textContent=Math.max(0,deck.length-pointer); }
function showCompletion(){ document.getElementById('main-content').classList.add('hidden');document.getElementById('completion').classList.add('visible');const pct=deck.length?Math.round(scoreYes/deck.length*100):0;document.getElementById('completionMsg').textContent='You got '+scoreYes+' out of '+deck.length+' words right ('+pct+'%). '+(pct>=80?'Excellent!':pct>=50?'Keep going!':'Keep practising!'); }
function restartAll(){ initDeck(getFiltered()); }
function reviewWrong(){ if(!wrongCards.length){restartAll();return;}deck=shuffle([...wrongCards]);pointer=0;scoreYes=0;scoreNo=0;wrongCards=[];document.getElementById('reviewBanner').classList.add('visible');document.getElementById('completion').classList.remove('visible');document.getElementById('main-content').classList.remove('hidden');showCard();updateScore(); }
function buildCats(){ const container=document.getElementById('catBtns');container.innerHTML='';CAT_ORDER.filter(cat=>cat==="All"||ALL_CARDS.some(c=>c.cat===cat)).forEach(cat=>{ const count=cat==="All"?ALL_CARDS.length:ALL_CARDS.filter(c=>c.cat===cat).length;const btn=document.createElement('button');btn.className='cat-btn'+(cat===currentCat?' active':'');btn.textContent=cat+' ('+count+')';btn.onclick=()=>{ currentCat=cat;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');initDeck(getFiltered()); };container.appendChild(btn); }); }

buildCats(); initDeck(getFiltered());
</script>
