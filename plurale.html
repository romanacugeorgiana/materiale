<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Romanian Plurals</title>
<style>
:root{--bg:#f4f1eb;--a:#e94560;--b:#0f3460;--gn:#27ae60;--rd:#e74c3c;--yl:#f39c12;--pu:#8e44ad;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 12px 40px;touch-action:manipulation;}
h1{font-size:1.4rem;color:var(--b);text-align:center;}
.sub{color:#666;font-size:.82rem;text-align:center;margin-top:3px;margin-bottom:14px;}
.mode-row{display:flex;gap:0;border:2px solid var(--b);border-radius:12px;overflow:hidden;margin-bottom:14px;width:100%;max-width:420px;}
.mode-btn{flex:1;padding:10px 4px;border:none;background:white;color:var(--b);font-size:.85rem;font-weight:700;cursor:pointer;touch-action:manipulation;}
.mode-btn.active{background:var(--b);color:white;}
.cats{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;width:100%;max-width:480px;}
.cat-btn{padding:7px 12px;border:2px solid var(--b);background:white;color:var(--b);border-radius:999px;cursor:pointer;font-size:.76rem;font-weight:700;touch-action:manipulation;}
.cat-btn.active{background:var(--b);color:white;}
.cat-m{border-color:#2980b9;color:#2980b9;}.cat-m.active{background:#2980b9;}
.cat-f{border-color:var(--a);color:var(--a);}.cat-f.active{background:var(--a);}
.cat-n{border-color:var(--pu);color:var(--pu);}.cat-n.active{background:var(--pu);}
.pw{width:100%;max-width:420px;background:#ddd;border-radius:999px;height:7px;margin-bottom:6px;overflow:hidden;}
.pb{height:100%;background:linear-gradient(90deg,var(--b),var(--a));border-radius:999px;transition:width .3s;}
.pt{font-size:.76rem;color:#888;margin-bottom:14px;text-align:center;}
/* flashcard */
#fcs{display:flex;flex-direction:column;align-items:center;width:100%;}
#fcs.hidden,#mcs.hidden,.done.hidden{display:none;}
.cw{width:100%;max-width:420px;height:190px;position:relative;margin-bottom:16px;cursor:pointer;user-select:none;}
.card{width:100%;height:100%;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 20px;gap:6px;box-shadow:0 6px 24px rgba(0,0,0,.14);transition:opacity .18s;position:absolute;top:0;left:0;}
.cf{background:linear-gradient(135deg,var(--b),#1a1a2e);color:#fff;}
.cb{background:linear-gradient(135deg,var(--a),#a93226);color:#fff;opacity:0;pointer-events:none;}
.show{opacity:1;pointer-events:auto;}.hide{opacity:0;pointer-events:none;}
.ctag{font-size:.62rem;text-transform:uppercase;letter-spacing:2px;opacity:.5;}
.cword{font-size:clamp(1.2rem,5vw,1.75rem);font-weight:700;text-align:center;line-height:1.2;}
.cen{font-size:.82rem;opacity:.65;text-align:center;}
.crule{font-size:.72rem;opacity:.6;text-align:center;font-style:italic;}
.fhint{font-size:.62rem;opacity:.32;letter-spacing:1px;}
.kr{display:flex;gap:10px;margin-bottom:12px;width:100%;max-width:420px;}
.kb{flex:1;padding:15px 6px;border:none;border-radius:14px;font-size:.95rem;font-weight:700;cursor:pointer;touch-action:manipulation;transition:transform .1s;}
.kb:active{transform:scale(.93);}
.ky{background:var(--gn);color:#fff;}.kn{background:var(--rd);color:#fff;}
.sr{display:flex;gap:0;margin-bottom:14px;width:100%;max-width:420px;}
.si{flex:1;text-align:center;font-size:.76rem;color:#666;}
.sn{font-size:1.4rem;font-weight:700;display:block;}
.sn.g{color:var(--gn);}.sn.r{color:var(--rd);}.sn.bl{color:var(--b);}
.nr{display:flex;gap:8px;width:100%;max-width:420px;margin-bottom:8px;}
.nb{flex:1;padding:11px 4px;border:none;border-radius:11px;font-size:.83rem;font-weight:600;cursor:pointer;touch-action:manipulation;transition:transform .1s;}
.nb:active{transform:scale(.93);}
.np{background:#e0e0e0;color:#444;}.nn{background:var(--b);color:#fff;}.ns{background:var(--yl);color:#fff;}
.sh{font-size:.7rem;color:#bbb;margin-bottom:6px;}
/* mc */
#mcs{display:flex;flex-direction:column;align-items:center;width:100%;}
.mcc{width:100%;max-width:420px;background:linear-gradient(135deg,var(--b),#1a1a2e);color:#fff;border-radius:20px;padding:22px 20px;margin-bottom:16px;box-shadow:0 6px 24px rgba(0,0,0,.14);text-align:center;}
.mcl{font-size:.62rem;text-transform:uppercase;letter-spacing:2px;opacity:.5;margin-bottom:6px;}
.mcw{font-size:clamp(1.3rem,5vw,1.85rem);font-weight:700;margin-bottom:4px;}
.mce{font-size:.85rem;opacity:.65;}
.mcq{font-size:.8rem;opacity:.55;margin-top:6px;}
.mco{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px;margin-bottom:14px;}
.mcob{padding:16px 8px;border:2px solid #ddd;border-radius:14px;background:#fff;font-size:1rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;touch-action:manipulation;color:#333;}
.mcob:active{transform:scale(.95);}
.mcob.correct{background:var(--gn);border-color:var(--gn);color:#fff;}
.mcob.wrong{background:var(--rd);border-color:var(--rd);color:#fff;opacity:.75;}
.mcob.reveal{background:#d5f5e3;border-color:var(--gn);}
.mcob.disabled{pointer-events:none;}
.mcfb{width:100%;max-width:420px;padding:10px 14px;border-radius:12px;font-size:.86rem;font-weight:600;text-align:center;margin-bottom:12px;display:none;line-height:1.5;}
.mcfb.show{display:block;}
.mcfb.ok{background:#d5f5e3;color:#1e8449;}
.mcfb.bad{background:#fadbd8;color:#922b21;}
.mcnxt{width:100%;max-width:420px;padding:14px;border:none;border-radius:14px;background:var(--b);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;touch-action:manipulation;margin-bottom:10px;display:none;}
.mcnxt.show{display:block;}
.rb{background:#fff3cd;border:1px solid #ffc107;border-radius:10px;padding:8px 14px;font-size:.76rem;color:#856404;margin-bottom:10px;width:100%;max-width:420px;text-align:center;display:none;}
.rb.visible{display:block;}
/* done */
.done{flex-direction:column;align-items:center;text-align:center;padding:28px 16px;width:100%;}
.done.visible{display:flex;}
.done h2{font-size:1.7rem;color:var(--b);margin-bottom:8px;}
.done p{color:#666;margin-bottom:20px;font-size:.9rem;padding:0 12px;}
.dbtns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.db{padding:13px 22px;border-radius:14px;border:none;font-size:.95rem;font-weight:700;cursor:pointer;touch-action:manipulation;}
.db1{background:var(--a);color:#fff;}.db2{background:var(--rd);color:#fff;}
</style>
</head>
<body>
<h1>&#127479;&#127476; Romanian Plurals</h1>
<p class="sub">200 words &#183; Flashcards + Multiple Choice</p>
<div class="mode-row">
  <button class="mode-btn active" id="btn-fc" onclick="setMode('fc')">&#127183; Flashcards</button>
  <button class="mode-btn"        id="btn-mc" onclick="setMode('mc')">&#10067; Multiple Choice</button>
</div>
<div class="cats" id="catBtns"></div>
<div class="rb" id="revBanner">&#128260; Review Mode &#8212; only missed cards</div>
<div class="pw"><div class="pb" id="pb"></div></div>
<div class="pt" id="pt"></div>

<!-- FLASHCARDS -->
<div id="fcs">
  <div class="cw" id="cw">
    <div class="card cf show" id="cFront">
      <div class="ctag" id="fcTag">SINGULAR</div>
      <div class="cword" id="fcSg"></div>
      <div class="cen"   id="fcEn"></div>
      <div class="fhint">&#9658; tap to see plural</div>
    </div>
    <div class="card cb hide" id="cBack">
      <div class="ctag">PLURAL</div>
      <div class="cword" id="fcPl"></div>
      <div class="crule" id="fcRule"></div>
      <div class="fhint">&#9658; tap to see singular</div>
    </div>
  </div>
  <div class="kr">
    <button class="kb kn" onclick="fcMark(false)">&#10007; Don&#8217;t know</button>
    <button class="kb ky" onclick="fcMark(true)">&#10003; I know</button>
  </div>
  <div class="sr">
    <div class="si"><span class="sn g" id="fcY">0</span>Know</div>
    <div class="si"><span class="sn r" id="fcN">0</span>Don&#8217;t know</div>
    <div class="si"><span class="sn bl" id="fcL">0</span>Left</div>
  </div>
  <div class="nr">
    <button class="nb np" onclick="fcPrev()">&#8592; Back</button>
    <button class="nb ns" onclick="fcShuf()">&#128256;</button>
    <button class="nb nn" onclick="fcNext()">Next &#8594;</button>
  </div>
  <div class="sh">&#8592; swipe back &nbsp;|&nbsp; swipe forward &#8594;</div>
</div>
<div class="done hidden" id="fcd">
  <div style="font-size:3rem">&#127881;</div><h2>Well done!</h2>
  <p id="fcdm"></p>
  <div class="dbtns">
    <button class="db db1" onclick="fcRestart()">&#128257; Restart</button>
    <button class="db db2" onclick="fcReview()">&#10007; Review mistakes</button>
  </div>
</div>

<!-- MULTIPLE CHOICE -->
<div id="mcs" class="hidden">
  <div class="mcc">
    <div class="mcl" id="mcTag">SINGULAR</div>
    <div class="mcw" id="mcSg"></div>
    <div class="mce" id="mcEn"></div>
    <div class="mcq">What is the plural?</div>
  </div>
  <div class="mco" id="mcOpts"></div>
  <div class="mcfb" id="mcFb"></div>
  <button class="mcnxt" id="mcNxt" onclick="mcNext()">Next &#8594;</button>
  <div class="sr">
    <div class="si"><span class="sn g" id="mcY">0</span>Correct</div>
    <div class="si"><span class="sn r" id="mcN">0</span>Wrong</div>
    <div class="si"><span class="sn bl" id="mcL">0</span>Left</div>
  </div>
</div>
<div class="done hidden" id="mcd">
  <div style="font-size:3rem">&#127881;</div><h2>Well done!</h2>
  <p id="mcdm"></p>
  <div class="dbtns">
    <button class="db db1" onclick="mcRestart()">&#128257; Restart</button>
    <button class="db db2" onclick="mcReviewWrong()">&#10007; Review mistakes</button>
  </div>
</div>

const CATS=["All","Masculine (M)","Feminine (F)","Neuter (N)"];
const CMAP={"All":null,"Masculine (M)":"M","Feminine (F)":"F","Neuter (N)":"N"};
let cat="All", mode="fc";
let fDeck=[],fPtr=0,fY=0,fN=0,fWrong=[],fSide="front";
let mDeck=[],mPtr=0,mY=0,mN=0,mWrong=[],mAns=false;

function filtered(){const g=CMAP[cat];return g?W.filter(w=>w[3]===g):[...W];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// ── Distractor generator ──────────────────────────────────────────────────
// Generates 3 plausible but WRONG plural forms of the SAME word
function genWrongs(sg, pl) {
  const seen = new Set([pl]);
  const out = [];
  function add(w) {
    if (w && typeof w==='string' && w.length>1 && !seen.has(w)) { seen.add(w); out.push(w); }
  }
  const sl = sg.toLowerCase();
  // -ă endings
  if (sl.endsWith('\u0103')) {
    const stem = sg.slice(0,-1);
    add(stem+'i'); add(stem+'e'); add(stem+'uri'); add(sg); add(stem+'elor');
  }
  // -ie endings
  else if (sl.endsWith('ie')) {
    const stem = sg.slice(0,-2);
    add(stem+'i'); add(stem+'ii'); add(stem+'iuri'); add(sg); add(stem+'iei');
  }
  // -ea endings
  else if (sl.endsWith('ea')) {
    const stem = sg.slice(0,-2);
    add(stem+'i'); add(stem+'ei'); add(stem+'ele'); add(sg+'uri'); add(sg);
  }
  // -ou endings
  else if (sl.endsWith('ou')) {
    const stem = sg.slice(0,-2);
    add(stem+'oaie'); add(stem+'oi'); add(stem+'oiuri'); add(sg+'i'); add(sg+'ri');
  }
  // -iu endings
  else if (sl.endsWith('iu')) {
    const stem = sg.slice(0,-2);
    add(stem+'ie'); add(sg.slice(0,-1)); add(stem+'iuri'); add(sg);
  }
  // -eu endings
  else if (sl.endsWith('eu')) {
    const stem = sg.slice(0,-2);
    add(stem+'ee'); add(stem+'ei'); add(sg+'ri'); add(sg+'i');
  }
  // -u endings (not above)
  else if (sl.endsWith('u')) {
    const stem = sg.slice(0,-1);
    add(stem+'uri'); add(stem+'e'); add(stem+'i'); add(sg); add(stem+'elor');
  }
  // -e endings
  else if (sl.endsWith('e')) {
    const stem = sg.slice(0,-1);
    add(sg+'uri'); add(stem+'uri'); add(sg); add(stem+'elor'); add(stem+'i');
  }
  // consonant endings
  else {
    add(sg+'e'); add(sg+'uri'); add(sg+'i'); add(sg); add(sg+'elor');
  }
  // universal safety-net
  for (const s of [sg+'uri',sg+'i',sg+'e',sg,sg+'ilor',sg+'lor']) {
    if (out.length>=3) break; add(s);
  }
  return out.slice(0,3);
}

// ── MODE ──────────────────────────────────────────────────────────────────
function setMode(m){
  mode=m;
  $('btn-fc').classList.toggle('active',m==='fc');
  $('btn-mc').classList.toggle('active',m==='mc');
  show('fcs',m==='fc'); show('fcd',false);
  show('mcs',m==='mc'); show('mcd',false);
  if(m==='fc')fcInit(filtered()); else mcInit(filtered());
}
function $(id){return document.getElementById(id);}
function show(id,v){
  const el=$(id);
  if(v){el.classList.remove('hidden');} else {el.classList.add('hidden');el.classList.remove('visible');}
}

function buildCats(){
  const c=$('catBtns'); c.innerHTML='';
  CATS.forEach(ct=>{
    const g=CMAP[ct];
    const n=g?W.filter(w=>w[3]===g).length:W.length;
    const btn=document.createElement('button');
    const cls=ct==="All"?"":ct.includes("M")?"cat-m":ct.includes("F")?"cat-f":"cat-n";
    btn.className='cat-btn '+(cls)+(ct===cat?' active':'');
    btn.textContent=ct+' ('+n+')';
    btn.onclick=()=>{cat=ct;document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');setMode(mode);};
    c.appendChild(btn);
  });
}
function updProg(ptr,tot){
  $('pb').style.width=tot?(ptr/tot*100)+'%':'0%';
  $('pt').textContent='Card '+(Math.min(ptr+1,tot))+' of '+tot;
}

// ── FLASHCARDS ────────────────────────────────────────────────────────────
const cF=$('cFront'), cB=$('cBack');
function fcFront(){cF.classList.replace('hide','show');cB.classList.replace('show','hide');cF.classList.add('show');cB.classList.add('hide');fSide='front';}
function fcFlip(){
  if(fSide==='front'){cF.classList.replace('show','hide');cB.classList.replace('hide','show');fSide='back';}
  else{fcFront();}
}
$('cw').addEventListener('click',fcFlip);
let tx=0,ty=0;
$('cw').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
$('cw').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>40&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0)fcNext();else fcPrev();}
  else if(Math.abs(dx)<12&&Math.abs(dy)<12)fcFlip();
},{passive:true});
function fcInit(cards){
  fDeck=shuffle([...cards]);fPtr=0;fY=0;fN=0;fWrong=[];
  $('revBanner').classList.remove('visible');show('fcd',false);show('fcs',true);
  fcShow();fcSU();
}
function fcShow(){
  if(fPtr>=fDeck.length){fcDone();return;}
  const w=fDeck[fPtr];
  const gl={M:'MASCULINE',F:'FEMININE',N:'NEUTER'}[w[3]];
  $('fcTag').textContent=gl; $('fcSg').textContent=w[0]; $('fcEn').textContent=w[2];
  $('fcPl').textContent=w[1]; $('fcRule').textContent=w[4];
  fcFront(); updProg(fPtr,fDeck.length);
}
function fcMark(know){
  if(fPtr>=fDeck.length)return;
  if(know)fY++; else{fN++;if(!fWrong.find(x=>x[0]===fDeck[fPtr][0]))fWrong.push(fDeck[fPtr]);}
  fcSU();fPtr++;fcShow();
}
function fcNext(){if(fPtr<fDeck.length-1){fPtr++;fcShow();}}
function fcPrev(){if(fPtr>0){fPtr--;fcShow();}}
function fcShuf(){const r=fDeck.slice(fPtr);shuffle(r);fDeck=[...fDeck.slice(0,fPtr),...r];fcShow();}
function fcSU(){$('fcY').textContent=fY;$('fcN').textContent=fN;$('fcL').textContent=Math.max(0,fDeck.length-fPtr);}
function fcDone(){
  show('fcs',false);$('fcd').classList.remove('hidden');$('fcd').classList.add('visible');
  const p=fDeck.length?Math.round(fY/fDeck.length*100):0;
  $('fcdm').textContent='You knew '+fY+' of '+fDeck.length+' plurals ('+p+'%). '+(p>=80?'Excellent!':p>=50?'Keep going!':'Keep practising!');
}
function fcRestart(){show('fcd',false);show('fcs',true);$('fcd').classList.remove('visible');fcInit(filtered());}
function fcReview(){
  if(!fWrong.length){fcRestart();return;}
  fDeck=shuffle([...fWrong]);fPtr=0;fY=0;fN=0;fWrong=[];
  $('revBanner').classList.add('visible');show('fcd',false);$('fcd').classList.remove('visible');show('fcs',true);
  fcShow();fcSU();
}

// ── MULTIPLE CHOICE ───────────────────────────────────────────────────────
function mcInit(cards){
  mDeck=shuffle([...cards]);mPtr=0;mY=0;mN=0;mWrong=[];
  show('mcd',false);$('mcd').classList.remove('visible');show('mcs',true);
  mcShow();mcSU();
}
function mcShow(){
  if(mPtr>=mDeck.length){mcDone();return;}
  mAns=false;
  const w=mDeck[mPtr];
  const gl={M:'MASCULINE',F:'FEMININE',N:'NEUTER'}[w[3]];
  $('mcTag').textContent=gl; $('mcSg').textContent=w[0]; $('mcEn').textContent=w[2];
  const wrongs=genWrongs(w[0],w[1]);
  const opts=shuffle([w[1],...wrongs.slice(0,3)]);
  const cont=$('mcOpts'); cont.innerHTML='';
  opts.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='mcob'; btn.textContent=opt;
    btn.onclick=()=>mcAnswer(opt,w[1],btn);
    cont.appendChild(btn);
  });
  const fb=$('mcFb'); fb.className='mcfb'; fb.textContent='';
  $('mcNxt').classList.remove('show');
  updProg(mPtr,mDeck.length);
}
function mcAnswer(chosen,correct,btn){
  if(mAns)return; mAns=true;
  document.querySelectorAll('.mcob').forEach(b=>{
    b.classList.add('disabled');
    if(b.textContent===correct)b.classList.add('correct');
    else if(b===btn)b.classList.add('wrong');
  });
  const fb=$('mcFb');
  const rule=mDeck[mPtr][4];
  if(chosen===correct){
    mY++;
    fb.innerHTML='\u2713 Correct! <b>'+mDeck[mPtr][0]+'</b> \u2192 <b>'+correct+'</b> &nbsp;('+rule+')';
    fb.className='mcfb show ok';
  } else {
    mN++; if(!mWrong.find(x=>x[0]===mDeck[mPtr][0]))mWrong.push(mDeck[mPtr]);
    fb.innerHTML='\u2717 The plural of <b>'+mDeck[mPtr][0]+'</b> is <b>'+correct+'</b> &nbsp;('+rule+')';
    fb.className='mcfb show bad';
  }
  $('mcNxt').classList.add('show'); mcSU();
}
function mcNext(){mPtr++;mcShow();}
function mcSU(){$('mcY').textContent=mY;$('mcN').textContent=mN;$('mcL').textContent=Math.max(0,mDeck.length-mPtr);}
function mcDone(){
  show('mcs',false);$('mcd').classList.remove('hidden');$('mcd').classList.add('visible');
  const p=mDeck.length?Math.round(mY/mDeck.length*100):0;
  $('mcdm').textContent='You got '+mY+' of '+mDeck.length+' correct ('+p+'%). '+(p>=80?'Excellent!':p>=50?'Keep going!':'Keep practising!');
}
function mcRestart(){show('mcd',false);$('mcd').classList.remove('visible');show('mcs',true);mcInit(filtered());}
function mcReviewWrong(){
  if(!mWrong.length){mcRestart();return;}
  mDeck=shuffle([...mWrong]);mPtr=0;mY=0;mN=0;mWrong=[];
  show('mcd',false);$('mcd').classList.remove('visible');show('mcs',true);
  mcShow();mcSU();
}

buildCats(); setMode('fc');
</script>
